services:
  - type: web
    name: machnha-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_TEXT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_VERSION
        value: v1beta
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: true
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
